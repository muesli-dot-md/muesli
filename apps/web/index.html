<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muesli</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#cc9350" />
    <script>
      // Resolve the persisted theme mode ("muesli:theme" ∈ light|dark|system,
      // default system) and set data-theme BEFORE first paint so a hard refresh
      // never flashes the wrong colors. theme.svelte.ts mirrors this logic and
      // takes over once the app boots.
      (() => {
        let mode = null;
        try {
          mode = localStorage.getItem("muesli:theme");
        } catch {}
        const dark =
          mode === "dark" ||
          (mode !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "muesli-dark" : "muesli";
      })();
    </script>
    <style>
      /* First paint before the JS/CSS bundles load: pin the background to the
         floor each theme actually renders so a hard refresh never flashes a
         different shade. Values mirror what html's background-color resolves
         to once app.css loads (var(--floor) at zero tint): the muesli theme's
         neutral base-200 override in light, the shared --arc-base-200 with
         the floor's fallback chroma in dark — keep them in sync with app.css. */
      html {
        background-color: oklch(96.7% 0 0);
      }
      html[data-theme="muesli-dark"] {
        background-color: oklch(16.5% 0.001 262);
      }
      /* no-JS fallback (the script above didn't set data-theme) */
      @media (prefers-color-scheme: dark) {
        html:not([data-theme]) {
          background-color: oklch(16.5% 0.001 262);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
