# CLA enforcement (CLA Assistant Lite).
#
# First-time contributors are asked to sign CLA.md by commenting the sign
# phrase on their PR; the PR status check stays red until they do. Signatures
# are recorded on the `cla-signatures` branch of this repo (no external
# service). Comment `recheck` on a PR to re-run the check.
#
# The CLA exists so the Owner can dual-license (AGPL + commercial) — see the
# note at the bottom of CLA.md. Keep the allowlist to bots and the Owner only.

name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant Lite
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/muesli-dot-md/muesli/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "JulianBeaulieu,dependabot[bot],*[bot]"
          custom-notsigned-prcomment: >
            Thank you for your contribution! Before we can merge, we ask you to
            sign our [Contributor License Agreement](https://github.com/muesli-dot-md/muesli/blob/main/CLA.md)
            by posting the comment below. It lets Muesli stay sustainably
            maintained (AGPL for everyone + commercial licenses for
            enterprises) — your contribution stays open source.
