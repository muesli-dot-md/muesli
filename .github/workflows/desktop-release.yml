# Desktop release: signed updater artifacts + latest.json on a GitHub Release,
# plus unsigned Windows and Linux installers uploaded to the same release.
#
# Triggered by pushing a `desktop-vX.Y.Z` tag (or manually via
# workflow_dispatch, which releases whatever version tauri.conf.json declares).
# The macOS job runs on the same self-hosted macOS 15 (Sequoia) runner as
# desktop-macos.yml — see that file for why (screencapturekit macos_15_0 +
# Swift rpath). The windows/linux jobs MUST stay on GitHub-hosted runners:
# self-hosted is reserved for the trusted macOS release job (see the security
# note in desktop-macos.yml).
#
# Release coordination: release-macos creates the GitHub Release (it owns the
# updater latest.json); windows/linux depend on it and only `gh release upload`
# their installers to the existing release, so there is no create race.
#
# Version source of truth: apps/desktop/src-tauri/tauri.conf.json `version`.
# Tag pushes FAIL FAST if the tag doesn't match it.
#
# Required repo secrets (uploaded by a human; see apps/desktop/README.md):
#   TAURI_SIGNING_PRIVATE_KEY           — contents of apps/desktop/.updater-key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — contents of apps/desktop/.updater-key.pass
#   APPLE_CERTIFICATE                   — base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD          — password chosen at .p12 export
#   APPLE_SIGNING_IDENTITY              — e.g. "Developer ID Application: Julian Beaulieu (TEAMID)"
#   APPLE_API_ISSUER                    — App Store Connect API issuer ID (UUID)
#   APPLE_API_KEY                       — App Store Connect API key ID
#   APPLE_API_KEY_CONTENT               — contents of the AuthKey_<KEYID>.p8 file
# CI must never print any of these values.
#
# Tauri's bundler picks the APPLE_* vars up automatically: it imports the
# certificate into a temporary keychain, signs with the hardened runtime and
# src-tauri/Entitlements.plist, submits to Apple notarization via the API key,
# and staples the ticket. The minisign updater signature is independent and is
# what tauri-plugin-updater enforces.

name: Desktop Release

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Self-hosted PATH hygiene: the runner machine can carry stale mise shims
      # (a broken `rustup` shim once bricked this job — "rustup is not a valid
      # shim"). `command -v rustup` inside dtolnay's action passes on such a
      # shim, so put a REAL rustup ahead of any shim dir, installing it first
      # if ~/.cargo/bin doesn't have one.
      - name: Ensure a working rustup
        run: |
          if ! "$HOME/.cargo/bin/rustup" --version >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs | sh -s -- --default-toolchain none -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build (desktop)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Resolve version and verify the tag matches tauri.conf.json
        id: version
        run: |
          VERSION=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$GITHUB_REF_NAME" != "desktop-v$VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match tauri.conf.json version $VERSION (expected desktop-v$VERSION)"
            exit 1
          fi

      - name: Write App Store Connect API key
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      - name: Build Tauri app (Apple-signed, notarized, updater artifacts)
        working-directory: apps/desktop
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # APPLE_API_KEY_PATH is exported by the previous step.

      - name: Clean up App Store Connect API key
        if: always()
        run: rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle/macos"
          TARBALL=$(ls "$BUNDLE_DIR"/*.app.tar.gz | head -n1)
          ASSET_NAME=$(basename "$TARBALL")
          URL="https://github.com/muesli-dot-md/muesli/releases/download/desktop-v${VERSION}/${ASSET_NAME}"
          node -e '
            const fs = require("fs");
            const [version, url, sigPath] = process.argv.slice(1);
            const signature = fs.readFileSync(sigPath, "utf8").trim();
            fs.writeFileSync(
              "latest.json",
              JSON.stringify(
                {
                  version,
                  pub_date: new Date().toISOString(),
                  // aarch64-only for now; add darwin-x86_64 if/when an Intel
                  // build lands (spec: out of scope).
                  // TODO: add windows-x86_64 / linux-x86_64 here if/when the
                  // updater ships on those platforms (it is macOS-only today;
                  // the windows/linux jobs publish plain installers only).
                  platforms: { "darwin-aarch64": { url, signature } },
                },
                null,
                2,
              ) + "\n",
            );
          ' "$VERSION" "$URL" "${TARBALL}.sig"
          cat latest.json

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"
          # --latest: the desktop updater reads releases/latest/download/latest.json,
          # so a future non-desktop release in this monorepo must never steal the pointer.
          gh release create "desktop-v${VERSION}" \
            --title "Muesli Desktop v${VERSION}" \
            --generate-notes \
            --latest \
            "$BUNDLE_DIR"/macos/*.app.tar.gz \
            "$BUNDLE_DIR"/macos/*.app.tar.gz.sig \
            "$BUNDLE_DIR"/dmg/*.dmg \
            latest.json

  # ----------------------------------------------------------------------------
  # Windows installers — unsigned until we have a Windows signing cert.
  # GitHub-hosted runner only (self-hosted is reserved for the trusted macOS
  # release job). Uploads to the release created by release-macos.
  # ----------------------------------------------------------------------------
  windows:
    needs: [release-macos]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build (desktop)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          cache-on-failure: true

      - name: Resolve version
        id: version
        shell: bash
        # release-macos already fail-fasted if the tag mismatches tauri.conf.json.
        run: |
          VERSION=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Unsigned until we have a Windows signing cert.
      # createUpdaterArtifacts is disabled here: the updater only ships on
      # macOS (latest.json is darwin-only), and leaving it on would require
      # the minisign updater key on this GitHub-hosted runner.
      # Retries: pyke's CDN intermittently 403s runner IPs (ort-sys download;
      # Windows downloads fine otherwise — no ORT_LIB_LOCATION mirror needed).
      - name: Build Tauri app (unsigned NSIS + MSI)
        working-directory: apps/desktop
        shell: bash
        run: |
          for i in 1 2 3; do
            pnpm tauri build --bundles nsis,msi \
              --config '{"bundle":{"createUpdaterArtifacts":false}}' && exit 0
            [ $i -lt 3 ] && { echo "attempt $i failed; retrying in 90s"; sleep 90; }
          done
          exit 1

      - name: Upload installers to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"
          gh release upload "desktop-v${VERSION}" --clobber \
            "$BUNDLE_DIR"/nsis/*-setup.exe \
            "$BUNDLE_DIR"/msi/*.msi

  # ----------------------------------------------------------------------------
  # Linux installers (AppImage + .deb), unsigned. GitHub-hosted runner only
  # (self-hosted is reserved for the trusted macOS release job). Uploads to the
  # release created by release-macos. System deps and the ONNX Runtime mirror
  # step are copied from ci.yml's desktop-build (ubuntu) job.
  # ----------------------------------------------------------------------------
  linux:
    needs: [release-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tauri v2 Linux system prerequisites (webkit2gtk 4.1 + gtk + appindicator +
      # build tooling). Same list as ci.yml's desktop-build job.
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build (desktop)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          cache-on-failure: true

      - name: Resolve version
        id: version
        # release-macos already fail-fasted if the tag mismatches tauri.conf.json.
        run: |
          VERSION=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # pyke's CDN 403s GitHub's Linux runner IPs, so we mirror pyke's own
      # ms@1.24.2 static build as a release asset and link against it.
      - name: Provide ONNX Runtime static lib
        run: |
          curl -fsSL --retry 3 -o /tmp/ort.tgz \
            https://github.com/muesli-dot-md/.github/releases/download/ci-assets/onnxruntime-1.24.2-linux-x64-static.tar.gz
          mkdir -p "$HOME/onnxruntime"
          tar xzf /tmp/ort.tgz -C "$HOME/onnxruntime"
          echo "ORT_LIB_LOCATION=$HOME/onnxruntime" >> "$GITHUB_ENV"

      # createUpdaterArtifacts is disabled here: the updater only ships on
      # macOS (latest.json is darwin-only), and leaving it on would require
      # the minisign updater key on this GitHub-hosted runner.
      - name: Build Tauri app (AppImage + deb)
        working-directory: apps/desktop
        run: |
          pnpm tauri build --bundles appimage,deb \
            --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload installers to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"
          gh release upload "desktop-v${VERSION}" --clobber \
            "$BUNDLE_DIR"/appimage/*.AppImage \
            "$BUNDLE_DIR"/deb/*.deb
