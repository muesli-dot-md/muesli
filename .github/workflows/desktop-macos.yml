# macOS / Apple desktop app build.
#
# Runs on GitHub-hosted macos-15 (Sequoia): the desktop crate uses
# `screencapturekit` with the `macos_15_0` feature, and src-tauri/build.rs adds
# a `/usr/lib/swift` rpath for the Swift runtime the screencapturekit/apple-*
# crates link against, so macOS 15 is required.
#
# SECURITY: this workflow runs on pull requests, so it must NEVER use the
# self-hosted runner — fork PRs would execute arbitrary code on the release
# machine. Only tag-triggered desktop-release.yml may target [self-hosted,
# macOS].
#
# This workflow builds UNSIGNED (Apple-wise) for build verification only, with
# updater artifacts disabled (see the step below) so no signing secret is
# needed. Apple signing + notarization happen in desktop-release.yml, which
# holds the APPLE_* and TAURI_SIGNING_* secrets.
#
# Kept in its own workflow so a missing/offline macOS runner does not block the
# Linux/Windows CI in ci.yml.

name: Desktop (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: desktop-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build (desktop)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Build desktop frontend
        run: pnpm --filter Muesli build

      # Full app build (unsigned, updater artifacts disabled). This workflow only
      # verifies the production build path; signed updater artifacts (.app.tar.gz
      # + .sig) are produced by desktop-release.yml, which holds the
      # TAURI_SIGNING_* secrets. Disabling createUpdaterArtifacts here means no
      # private key is needed on ordinary CI runs.
      - name: Build Tauri app (unsigned)
        working-directory: apps/desktop
        run: pnpm tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'
