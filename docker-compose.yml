# Dev stack (ADR 0017). Production adds Traefik + MinIO + the server image; on shared
# infrastructure these services already exist and the server points at them via .env.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: muesli
      POSTGRES_PASSWORD: muesli
      POSTGRES_DB: muesli
    ports:
      - "5433:5432" # host 5433: 5432 is commonly taken by other local stacks
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muesli"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379" # host 6380: 6379 is commonly taken by other local stacks

  # Dev OIDC issuer (ADR 0012). Optional: without OIDC_ISSUER the server runs in open mode.
  # Static logins: dev@muesli.md / password, friend@muesli.md / password
  dex:
    image: dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./dev/dex/config.yaml:/etc/dex/config.yaml:ro

  # SECOND dev OIDC issuer (Phase 5 multi-issuer SSO, ADR 0012 "Per-Workspace IdP"): the
  # "corporate IdP" a workspace registers via PUT /api/workspaces/{id}/sso. Static login:
  # corp@corpdomain.example / password. Driven by apps/web/scripts/enterprise-e2e.mjs.
  dex2:
    image: dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5558:5558"
    volumes:
      - ./dev/dex2/config.yaml:/etc/dex/config.yaml:ro

  # S3-compatible dev storage backend (ADR 0013). API on :9000, console on :9001
  # (login: muesli / muesli-dev-secret). The server signs with MUESLI_S3_ACCESS_KEY /
  # MUESLI_S3_SECRET_KEY (= these root credentials in dev, see .env.example).
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: muesli
      MINIO_ROOT_PASSWORD: muesli-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  # One-shot: create the dev bucket (muesli-dev). Re-running is harmless.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - mc alias set muesli http://minio:9000 muesli muesli-dev-secret
        && mc mb --ignore-existing muesli/muesli-dev

  # Dev git forge for the GitHub-compatible storage backend (ADR 0013, kind "github" —
  # the Contents API is wire-compatible across GitHub/Gitea/Forgejo). Host port 3300:
  # 3000 is commonly taken (Grafana, dev servers). No install wizard (INSTALL_LOCK);
  # sqlite inside the volume. Create the admin user once after first boot:
  #   docker compose exec gitea gitea admin user create --admin --username muesli \
  #     --password muesli-dev-secret --email gitea@muesli.md --must-change-password=false
  # (workspace-github-e2e.mjs does this automatically and mints its own API token.)
  gitea:
    image: gitea/gitea:1.22-rootless
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: http://localhost:3300/
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__DISABLE_SSH: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__log__LEVEL: Info
    ports:
      - "3300:3000"
    volumes:
      - giteadata:/var/lib/gitea
      - giteaconfig:/etc/gitea
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/healthz"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  pgdata:
  miniodata:
  giteadata:
  giteaconfig:
